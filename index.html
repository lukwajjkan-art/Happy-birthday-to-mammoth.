<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:
    linear-gradient(
    rgba(255,182,193,.6),
    rgba(255,228,225,.6)),
    url("background.jpg");
    background-size:cover;
    background-position:center;
    text-align:center;
    overflow-x:hidden;
}
.page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}
h1,h2{
    color:#ff3b7f;
}

h1{
    animation:bounce 2s infinite;
}
input{
    padding:15px;
    width:250px;
    border:none;
    border-radius:30px;
    text-align:center;
    font-size:18px;
}
button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    background:#ff3b7f;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}
#main,
#surprise,
#letter{
    display:none;
}
.gallery img{
    width:280px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}
.card{
    background:rgba(255,255,255,.8);
    padding:30px;
    border-radius:20px;
    max-width:700px;
    line-height:1.8;
    margin-top:30px;
}
.heart{
    position:fixed;
    animation:float 6s linear infinite;
    color:#ff3b7f;
    opacity:.8;
    filter:drop-shadow(0 0 10px pink);
}
.spark{
    position:fixed;
    animation:fade 3s linear forwards;
}
@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
@keyframes fade{
    to{
        opacity:0;
        transform:scale(2);
    }
}

h1{
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}
</style>
</head>

<body>

<div id="login" class="page">
    <h1>🎁 มีเซอร์ไพรส์สำหรับคนพิเศษ 🎁</h1>
    <p>กรอกรหัสวันครบรอบของเรา</p>

    <input
        id="password"
        type="password"
        placeholder="ใส่รหัส">

    <button onclick="checkPassword()">
        เปิดของขวัญ ❤️
    </button>

    <p id="error"></p>
</div>

<div id="main" class="page">

    <div id="giftBox">
        <div style="font-size:100px;">🎁</div>
        <h2>กดเปิดของขวัญสิ</h2>

        <button onclick="openGift()">
            เปิดของขวัญ
        </button>
    </div>

    <div id="surprise">

        <h1>🎂 Happy Birthday My Love 🎂</h1>
        <h2>11 กรกฎาคม ❤️</h2>
        <h2>สุขสันต์วันเกิดนะคนพิเศษของเค้า</h2>
<div class="card">
    <h3>⏳ เราอยู่ด้วยกันมาแล้ว</h3>
    <p id="loveTime"></p>
</div>
        <div class="gallery">
            <img id="slide" src="IMG_9471.jpeg">
        </div>

        <button onclick="openLetter()">
            💌 เปิดจดหมายลับ
        </button>

        <div id="letter" class="card">
            <p id="typing"></p>
        </div>

    </div>

</div>

<audio id="music" loop>
    <source src="[Lyrics] นับหนึ่ง (From now on) - Billkin (Thai_Eng_Rom_中字) - cacinginSEA (youtube).mp3" type="audio/mpeg">
</audio>

<script>

function checkPassword(){

    const pass =
    document.getElementById("password").value;

    if(pass === "07062024"){

        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="flex";

        const music =
        document.getElementById("music");

        music.play().catch(()=>{});

        setInterval(()=>{

            const heart =
            document.createElement("div");

            heart.className="heart";
            heart.innerHTML="❤️";

            heart.style.left =
            Math.random()*100+"vw";

            heart.style.fontSize =
            (20+Math.random()*30)+"px";

            document.body.appendChild(heart);

            setTimeout(()=>{
                heart.remove();
            },6000);

        },300);

    }else{

        document.getElementById("error").innerHTML =
        "❌ ใบ้หน่อย... เป็นวันที่เราเริ่มต้นกัน ❤️";

    }
}

function openGift(){

    document.getElementById("giftBox").style.display="none";
    document.getElementById("surprise").style.display="block";

    fireworks();
}

function fireworks(){

    for(let i=0;i<100;i++){

        const spark =
        document.createElement("div");

        spark.className="spark";
        spark.innerHTML="✨";

        spark.style.left =
        Math.random()*100+"vw";

        spark.style.top =
        Math.random()*100+"vh";

        spark.style.fontSize="30px";

        document.body.appendChild(spark);

        setTimeout(()=>{
            spark.remove();
        },3000);
    }
}

const images = [
"IMG_9471.jpeg",
"IMG_6047.jpeg",
"IMG_0092.jpeg",
"IMG_8677.jpeg",
"IMG_8683.jpeg"
];

let current = 0;

setInterval(()=>{

    const slide =
    document.getElementById("slide");

    if(slide){

        current =
        (current+1)%images.length;

        slide.src =
        images[current];
    }

},3000);

const text =
`ถึงคนพิเศษของเค้า ❤️

สุขสันต์วันเกิดนะคนเก่งของเค้า
ขอบคุณที่เข้ามาในชีวิตของเค้า
ตั้งแต่วันที่ 07/06/2024 จนถึงวันนี้

ทุกช่วงเวลาที่มีพี่อยู่ข้าง ๆ
เป็นความทรงจำที่ดีที่สุดเลยย

ขอให้พี่มีความสุขในทุก ๆ วัน
ยิ้มเยอะ ๆ และสมหวังในทุกเรื่อง หนูจะอยู่รักพี่ตลอกไปเลยน้า

ขอบคุณที่เป็นความรักที่ดีที่สุดของเค้า
รักเธอเสมอ จุ้บๆ ❤️`;

function openLetter(){

    document.getElementById("letter").style.display="block";
    document.getElementById("typing").innerHTML="";

    let i = 0;

    const typing =
    setInterval(()=>{

        document.getElementById("typing")
        .innerHTML += text.charAt(i);

        i++;

        if(i >= text.length){
            clearInterval(typing);
        }

    },50);
}
function updateLoveTime() {

    const startDate =
    new Date("2024-06-07T00:00:00");

    const now =
    new Date();

    const diff =
    now - startDate;

    const days =
    Math.floor(diff / (1000 * 60 * 60 * 24));

    const hours =
    Math.floor(diff / (1000 * 60 * 60));

    const minutes =
    Math.floor(diff / (1000 * 60));

    const seconds =
    Math.floor(diff / 1000);

    document.getElementById("loveTime").innerHTML =
    `
    ❤️ ${days} วัน<br>
    ❤️ ${hours.toLocaleString()} ชั่วโมง<br>
    ❤️ ${minutes.toLocaleString()} นาที<br>
    ❤️ ${seconds.toLocaleString()} วินาที
    `;
}
</script>

</body>
</html>
