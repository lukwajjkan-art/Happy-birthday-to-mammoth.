<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:
    linear-gradient(
    rgba(255,182,193,.6),
    rgba(255,228,225,.6)),
    url("background.jpg");
    background-size:cover;
    background-position:center;
    text-align:center;
    overflow-x:hidden;
}
.page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}
h1,h2{
    color:#ff3b7f;
}

h1{
    animation:bounce 2s infinite;
}
input{
    padding:15px;
    width:250px;
    border:none;
    border-radius:30px;
    text-align:center;
    font-size:18px;
}
button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    background:#ff3b7f;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}
#main,
#surprise,
#letter{
    display:none;
}
.gallery img{
    width:280px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}
.card{
    background:rgba(255,255,255,.8);
    padding:30px;
    border-radius:20px;
    max-width:700px;
    line-height:1.8;
    margin-top:30px;
}
.heart{
    position:fixed;
    animation:float 6s linear infinite;
    color:#ff3b7f;
    opacity:.8;
    filter:drop-shadow(0 0 10px pink);
}
.spark{
    position:fixed;
    animation:fade 3s linear forwards;
}
@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
@keyframes fade{
    to{
        opacity:0;
        transform:scale(2);
    }
}

h1{
    animation:bounce 2s infinite;
}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

.gameHeart{

position:absolute;

font-size:40px;

cursor:pointer;

animation:pop .5s;

}

@keyframes pop{

from{
transform:scale(0);
}

to{
transform:scale(1);
}

}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }

}
    .dateBox{

display:flex;

gap:10px;

margin:20px;

}

.dateBox select{

padding:12px;

border-radius:20px;

border:none;

}
</style>
</head>

เปิดหัวใจ ❤️

<div id="main" class="page">

</div>

</button>

</button>

</div>

    <source src="[Lyrics] นับหนึ่ง (From now on) - Billkin (Thai_Eng_Rom_中字) - cacinginSEA (youtube).mp3" type="audio/mpeg">
</audio>

<script>


        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="flex";

        const music =
        document.getElementById("music");

        music.play().catch(()=>{});

        setInterval(()=>{

            const heart =
            document.createElement("div");

            heart.className="heart";
            heart.innerHTML="❤️";

            heart.style.left =
            Math.random()*100+"vw";

            heart.style.fontSize =
            (20+Math.random()*30)+"px";

            document.body.appendChild(heart);

            setTimeout(()=>{
                heart.remove();
            },6000);

        },300);

    }else{

        document.getElementById("error").innerHTML =
        "❌ ใบ้หน่อย... เป็นวันที่เราเริ่มต้นกัน ❤️";

    }
}

function openGift(){

    document.getElementById("giftBox").style.display="none";
    document.getElementById("surprise").style.display="block";

    fireworks();
}

function fireworks(){

    for(let i=0;i<100;i++){

        const spark =
        document.createElement("div");

        spark.className="spark";
        spark.innerHTML="✨";

        spark.style.left =
        Math.random()*100+"vw";

        spark.style.top =
        Math.random()*100+"vh";

        spark.style.fontSize="30px";

        document.body.appendChild(spark);

        setTimeout(()=>{
            spark.remove();
        },3000);
    }
}

const images = [
"IMG_9471.jpeg",
"IMG_6047.jpeg",
"IMG_0092.jpeg",
"IMG_8677.jpeg",
"IMG_8683.jpeg"
];

let current = 0;

setInterval(()=>{

    const slide =
    document.getElementById("slide");

    if(slide){

        current =
        (current+1)%images.length;

        slide.src =
        images[current];
    }

},3000);

const text =
`ถึงคนพิเศษของเค้า ❤️

สุขสันต์วันเกิดนะคนเก่งของเค้า
ขอบคุณที่เข้ามาในชีวิตของเค้า
ตั้งแต่วันที่ 07/06/2024 จนถึงวันนี้
ทุกช่วงเวลาที่มีพี่อยู่ข้าง ๆ
เป็นความทรงจำที่ดีที่สุดเลยย
ขอให้พี่มีความสุขในทุก ๆ วัน
ยิ้มเยอะ ๆ และสมหวังในทุกเรื่อง หนูจะอยู่รักพี่ตลอกไปเลยน้า
ขอบคุณที่เป็นความรักที่ดีที่สุดของเค้า
รักเธอเสมอ จุ้บๆ ❤️`;

function openLetter(){

    document.getElementById("letter").style.display="block";
    document.getElementById("typing").innerHTML="";

    let i = 0;

    const typing =
    setInterval(()=>{

        document.getElementById("typing")
        .innerHTML += text.charAt(i);

        i++;

        if(i >= text.length){
            clearInterval(typing);
        }

    },50);
}
function updateLoveTime() {

    const startDate =
    new Date("2024-06-07T00:00:00");

    const now =
    new Date();

    const diff =
    now - startDate;

const days = Math.floor(diff / (1000 * 60 * 60 * 24));
const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
const minutes = Math.floor((diff / (1000 * 60)) % 60);
const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("loveTime").innerHTML =
    `
    ❤️ ${days} วัน<br>
    ❤️ ${hours.toLocaleString()} ชั่วโมง<br>
    ❤️ ${minutes.toLocaleString()} นาที<br>
    ❤️ ${seconds.toLocaleString()} วินาที
    `;
}
    updateLoveTime();
setInterval(updateLoveTime,1000);
    function updateBirthdayCountdown(){

    const now = new Date();

    let nextBirthday =
    new Date(now.getFullYear(),6,11);

    if(now > nextBirthday){
        nextBirthday =
        new Date(now.getFullYear()+1,6,11);
    }

    const diff =
    nextBirthday - now;

    const days =
    Math.floor(diff/(1000*60*60*24));

    document.getElementById(
        "birthdayCountdown"
    ).innerHTML =
    `🎂 อีก ${days} วัน จะถึงวันเกิดของพี่แล้ว`;
}
updateBirthdayCountdown();
setInterval(updateBirthdayCountdown,1000);
    function secretMessage(){

    const messages = [
        "เค้ารักพี่ที่สุดเลย ❤️",
        "ขอบคุณที่อยู่ข้าง ๆ กันนะ 🥰",
        "ขอให้เราอยู่ด้วยกันไปนาน ๆ 💕",
        "พี่คือของขวัญที่ดีที่สุดของเค้า 🎁",
        "จุ๊บหนึ่งที 😘"
    ];

    const random =
    Math.floor(Math.random()*messages.length);

    alert(messages[random]);
}
    let score = 0;
let gameInterval;

function startGame(){

    score = 0;

    document.getElementById("score").innerHTML =
    "❤️ เก็บหัวใจให้ครบ 10 ดวง";

    const area =
    document.getElementById("gameArea");

    area.style.display = "block";

    area.querySelectorAll(".gameHeart")
        .forEach(h => h.remove());

    clearInterval(gameInterval);

    gameInterval =
    setInterval(createHeart,700);
}

function createHeart(){

    const area =
    document.getElementById("gameArea");

    if(score >= 10){
        clearInterval(gameInterval);
        return;
    }

    const heart =
    document.createElement("div");

    heart.className = "gameHeart";
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random()*80 + "%";

    heart.style.top =
        Math.random()*80 + "%";

    heart.onclick = function(){

        score++;

        document.getElementById("score")
        .innerHTML =
        `❤️ เก็บได้ ${score}/10 ดวง`;

        heart.remove();

        if(score >= 10){

            clearInterval(gameInterval);

            setTimeout(()=>{
                alert("🎉 เก่งมาก! ของรางวัลคือ... จุ๊บ 1 ที 😘❤️");
            },300);
        }
    };

    area.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },3000);
}

document.getElementById("day")

const d =
document.getElementById("day").value

y==="2024"
){

document.getElementById(
"login"
).style.display="none"


document.getElementById(
"main"
).style.display="flex"


document.getElementById(
"music"
).play()


}else{

document.getElementById(
"error"
).innerHTML =
"อืม…ลองนึกถึงวันนั้นอีกทีนะ 😏"

}
}
}
