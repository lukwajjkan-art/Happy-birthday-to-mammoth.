```html
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Happy Birthday ❤️</title>

<style>

body{

margin:0;

font-family:Arial;

background:#f9d9e2;

text-align:center;

overflow-x:hidden;

}

.page{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

}

#main{

display:none;

}

h1{

color:#ff3d85;

}

.dateBox{

display:flex;

gap:10px;

margin:20px;

}

select{

padding:14px;

border:none;

border-radius:20px;

}

button{

padding:16px 28px;

border:none;

border-radius:30px;

background:#ff3d85;

color:white;

cursor:pointer;

font-size:18px;

}

.card{

background:white;

padding:30px;

border-radius:20px;

max-width:700px;

}

.gallery img{

width:300px;

border-radius:20px;

}

.heart{

position:fixed;

animation:float 5s linear;

}

@keyframes float{

from{

transform:
translateY(100vh);

opacity:1;

}

to{

transform:
translateY(-100px);

opacity:0;

}

}

.flash{

position:fixed;

inset:0;

background:white;

animation:flash .8s;

}

@keyframes flash{

0%{
opacity:0;
}

50%{
opacity:1;
}

100%{
opacity:0;
}

}

</style>

</head>

<body>



<div id="login" class="page">

<h1>
🔐 ปลดล็อกหัวใจ
</h1>

<p>
วันที่เราเริ่มต้นกันคือ?
</p>

<div class="dateBox">

<select id="day">

<option value="">
วัน
</option>

<option value="7">
7
</option>

</select>



<select id="month">

<option value="">
เดือน
</option>

<option value="6">
6
</option>

</select>



<select id="year">

<option value="">
ปี
</option>

<option value="2024">
2024
</option>

</select>

</div>


<button onclick="checkDate()">

เปิดหัวใจ ❤️

</button>


<p id="error"></p>

</div>





<div id="main" class="page">

<h1>

🎂 Happy Birthday My Love

</h1>

<h2>

11 กรกฎาคม ❤️

</h2>


<div class="card">

<h3>

เราอยู่ด้วยกันมาแล้ว

</h3>

<p id="loveTime"></p>

</div>


<div class="gallery">

<img
id="slide"
src="IMG_9471.jpeg">

</div>


<br>

<button onclick="openLetter()">

💌 เปิดจดหมาย

</button>


<div
id="letter"
class="card"

style="display:none;">

<p id="typing"></p>

</div>

</div>



<audio
id="music"
loop>

<source
src="[Lyrics] นับหนึ่ง (From now on) - Billkin (Thai_Eng_Rom_中字) - cacinginSEA (youtube).mp3">

</audio>




<script>

function checkDate(){

const d=
document.getElementById(
"day"
).value

const m=
document.getElementById(
"month"
).value

const y=
document.getElementById(
"year"
).value


if(

d==="7"&&
m==="6"&&
y==="2024"

){

const flash=
document.createElement(
"div"
)

flash.className=
"flash"

document.body.appendChild(
flash
)

setTimeout(()=>{

flash.remove()

document
.getElementById(
"login"
)
.style.display=
"none"

document
.getElementById(
"main"
)
.style.display=
"flex"

music.play()

startHearts()

},800)

}

else{

document
.getElementById(
"error"
)

.innerHTML=

"อืม…ลองนึกถึงวันนั้นอีกทีนะ 😏"

}

}



function startHearts(){

setInterval(()=>{

const h=
document.createElement(
"div"
)

h.className=
"heart"

h.innerHTML=
"❤️"

h.style.left=
Math.random()*100+
"vw"

h.style.fontSize=
20+
Math.random()*30+
"px"

document.body
.appendChild(h)

setTimeout(

()=>h.remove(),

5000

)

},300)

}



const images=[

"IMG_9471.jpeg",

"IMG_6047.jpeg",

"IMG_0092.jpeg",

"IMG_8677.jpeg",

"IMG_8683.jpeg"

]


let current=0


setInterval(()=>{

const s=

document
.getElementById(
"slide"
)

if(s){

current=

(current+1)

%

images.length

s.src=

images[
current
]

}

},3000)




const text=

`สุขสันต์วันเกิดนะ ❤️

ขอบคุณที่อยู่ด้วยกัน

ตั้งแต่ 07/06/2024

รักที่สุดเลย`



function openLetter(){

letter.style.display=
"block"

typing.innerHTML=""

let i=0

const t=
setInterval(()=>{

typing.innerHTML+=

text.charAt(i)

i++

if(

i>=text.length

){

clearInterval(t)

}

},50)

}



function updateLoveTime(){

const start=

new Date(
"2024-06-07"
)

const now=

new Date()

const diff=

now-start

const days=

Math.floor(
diff/
86400000
)

loveTime.innerHTML=

`❤️ ${days} วัน`

}



updateLoveTime()

setInterval(

updateLoveTime,

1000

)

</script>

</body>

</html>
```
